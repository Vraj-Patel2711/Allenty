version: '3.8'

services:
  # 1. DATABASE (PostgreSQL)
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=allenty_db
      - POSTGRES_USER=allenty_user
      - POSTGRES_PASSWORD=securepassword123
    ports:
      - "5432:5432"

  # 2. BACKEND API
  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DEBUG=1
      # These now match the DB service above
      - DB_NAME=allenty_db
      - DB_USER=allenty_user
      - DB_PASSWORD=securepassword123
      - DB_HOST=db
      - DB_PORT=5432

  # 3. WEB DASHBOARD
  frontend-web:
    build: ./frontend-web
    command: npm run dev
    volumes:
      - ./frontend-web:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

  # 4. REDIS
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
